name: Agent Semantic Version

on:
  push:
    branches:
      - develop

jobs:
  release-please:
    name: Release Please
    runs-on: kubernetes

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: develop
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
